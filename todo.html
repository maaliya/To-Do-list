<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="stylelist.css">
</head>
<body>
    <main class="app-shell">
        <section class="todo-panel" aria-labelledby="page-title">
            <header class="hero">
                <p class="eyebrow">Daily planner</p>
                <h1 id="page-title">To-Do List</h1>
                <p class="subtitle">Capture tasks, mark wins, and keep the day moving.</p>
            </header>

            <form class="task-form" id="task-form">
                <label class="sr-only" for="int">New task</label>
                <input id="int" type="text" placeholder="Add a new task..." autocomplete="off">
                <label class="sr-only" for="priority-select">Priority</label>
                <select id="priority-select" aria-label="Task priority">
                    <option value="normal">Normal</option>
                    <option value="high">High</option>
                    <option value="low">Low</option>
                </select>
                <label class="sr-only" for="color-select">Task color</label>
                <select id="color-select" aria-label="Task color">
                    <option value="mint">Mint</option>
                    <option value="sun">Sun</option>
                    <option value="rose">Rose</option>
                    <option value="sky">Sky</option>
                    <option value="grape">Grape</option>
                    <option value="lime">Lime</option>
                </select>
                <button type="submit">Add</button>
            </form>

            <div class="stats" aria-live="polite">
                <span id="total-count">0 tasks</span>
                <span id="complete-count">0 completed</span>
                <span id="pending-count">0 pending</span>
            </div>

            <div class="toolbar" aria-label="Task options">
                <div class="filters" role="group" aria-label="Filter tasks">
                    <button class="filter-btn active" type="button" data-filter="all">All</button>
                    <button class="filter-btn" type="button" data-filter="pending">Pending</button>
                    <button class="filter-btn" type="button" data-filter="completed">Done</button>
                </div>
                <button class="clear-btn" id="clear-completed" type="button">Clear done</button>
            </div>

            <ul id="list-container" class="task-list"></ul>

            <p class="empty-state" id="empty-state">No tasks yet. Add one above to get started.</p>
        </section>
    </main>

    <script src="listscript.js"></script>
</body>
</html>
